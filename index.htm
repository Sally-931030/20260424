<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2016 政治獻金解密｜誰買下了我們的民主？</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* ================= 金權政治風 UI ================= */
        :root {
            --bg-color: #0d0d0d;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --gold: #d4af37;
            --gold-dim: #8c7322;
            --blood-red: #8b0000;
            --border-dark: #333;
            --rank-1: #ffdf00;
            --rank-2: #c0c0c0;
            --rank-3: #cd7f32;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-y: scroll;
        }

        h1, h2, h3, .serif {
            font-family: "Noto Serif TC", "PMingLiU", serif;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 按鈕與輸入框 */
        input[type="text"] {
            width: 70%;
            padding: 15px;
            font-size: 1.2rem;
            background: #1a1a1a;
            border: 1px solid var(--gold-dim);
            color: var(--gold);
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        button.action-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: var(--gold);
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button.action-btn:hover {
            background: #f1c40f;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        /* 標籤 (範例查詢) */
        .tag {
            display: inline-block;
            margin: 5px;
            padding: 5px 15px;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .tag:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* 視圖切換 */
        #landing-view, #results-view {
            display: none;
            animation: fadeIn 0.5s;
        }
        #landing-view.active, #results-view.active {
            display: block;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ================= Landing Page ================= */
        .hero {
            text-align: center;
            padding: 80px 0 40px;
            border-bottom: 1px solid var(--border-dark);
        }
        .hero h1 {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 40px;
        }
        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            border-left: 4px solid var(--blood-red);
            padding-left: 10px;
            color: var(--text-primary);
            margin-top: 50px;
            margin-bottom: 20px;
        }

        /* ================= 排行榜 (Leaderboard) ================= */
        .leaderboard-section {
            background: #111;
            border: 1px solid var(--border-dark);
            padding: 20px;
            margin-top: 40px;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-dark);
            margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn:hover { color: var(--gold); }
        .tab-btn.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
            font-weight: bold;
        }
        .rank-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px dashed var(--border-dark);
            transition: background 0.2s;
        }
        .rank-item:hover { background: #1a1a1a; }
        .rank-num {
            font-size: 1.5rem;
            font-family: "Courier New", monospace;
            font-weight: bold;
            width: 40px;
            color: var(--text-secondary);
        }
        .rank-item:nth-child(1) .rank-num { color: var(--rank-1); text-shadow: 0 0 5px rgba(255, 223, 0, 0.5); }
        .rank-item:nth-child(2) .rank-num { color: var(--rank-2); }
        .rank-item:nth-child(3) .rank-num { color: var(--rank-3); }
        
        .rank-info { flex: 1; display: flex; align-items: baseline; gap: 10px; }
        .rank-name { font-size: 1.1rem; color: #fff; font-weight: bold; }
        .rank-party { font-size: 0.85rem; color: var(--text-secondary); }
        .rank-money {
            font-size: 1.2rem;
            color: var(--gold);
            font-family: "Courier New", monospace;
        }

        /* 卡片設計 (精選與結果共用) */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .data-card {
            background: #151515;
            border: 1px solid var(--border-dark);
            padding: 20px;
            position: relative;
            transition: 0.3s;
        }
        .data-card:hover {
            border-color: var(--gold-dim);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .data-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--gold-dim);
        }
        .data-card .name { font-size: 1.5rem; color: #fff; margin-bottom: 5px; font-weight: bold; }
        .data-card .party { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 15px; }
        .data-card .money { font-size: 1.8rem; color: var(--gold); font-family: "Courier New", monospace; }
        .data-card .money::before { content: 'NT$ '; font-size: 1rem; color: var(--text-secondary); }
        .data-card .details {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
            border-top: 1px dotted var(--border-dark);
            padding-top: 10px;
        }

        /* ================= Results Page ================= */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--gold-dim);
            margin-bottom: 20px;
        }
        .results-header h2 { margin: 0; color: var(--gold); cursor: pointer; }
        .summary-stats {
            background: #111;
            border: 1px solid var(--border-dark);
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
        }
        .stat-box { text-align: center; }
        .stat-box .num { font-size: 1.8rem; color: var(--gold); font-weight: bold; }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        select {
            background: #1a1a1a;
            color: var(--gold);
            border: 1px solid var(--gold-dim);
            padding: 5px 10px;
        }

        /* 分頁控制項 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            padding-bottom: 30px;
            gap: 15px;
        }
        .page-btn {
            background: #1a1a1a;
            color: var(--gold);
            border: 1px solid var(--gold-dim);
            padding: 8px 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .page-btn:hover:not(:disabled) {
            background: var(--gold);
            color: #000;
        }
        .page-btn:disabled {
            color: var(--text-secondary);
            border-color: var(--border-dark);
            cursor: not-allowed;
            background: transparent;
        }
        .page-info {
            color: var(--text-primary);
            font-family: "Courier New", monospace;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="landing-view" class="active">
            <div class="hero">
                <h1 class="serif">誰買下了我們的民主？</h1>
                <p>2016 立委政治獻金全解密。揭開選舉背後的金權網絡，追蹤每一筆流向權力核心的企業與個人捐獻。</p>
                
                <div class="search-box">
                    <input type="text" id="main-search" placeholder="輸入立委姓名、政黨或選區 (如: 柯建銘、民主進步黨)...">
                    <button class="action-btn" onclick="executeSearch()">追蹤金流</button>
                </div>

                <div class="example-queries">
                    <span style="color:var(--text-secondary); font-size:0.9rem;">範例查詢：</span>
                    <span class="tag" onclick="quickSearch('柯建銘')">柯建銘</span>
                    <span class="tag" onclick="quickSearch('王金平')">王金平</span>
                    <span class="tag" onclick="quickSearch('民主進步黨')">民主進步黨</span>
                    <span class="tag" onclick="quickSearch('中國國民黨')">中國國民黨</span>
                </div>
            </div>

            <div class="leaderboard-section">
                <h3 class="serif" style="margin-top:0; color:var(--gold);">權力排行榜 Top 10</h3>
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchLeaderboard('total_desc', this)">總吸金王</button>
                    <button class="tab-btn" onclick="switchLeaderboard('corp_desc', this)">財團最愛</button>
                    <button class="tab-btn" onclick="switchLeaderboard('personal_desc', this)">小額募款王</button>
                </div>
                <ul class="rank-list" id="leaderboard-list">
                    </ul>
            </div>

            <div>
                <h3 class="serif section-title">編輯精選：話題候選人</h3>
                <div class="card-grid" id="editor-picks-container">
                    </div>
            </div>
        </div>

        <div id="results-view">
            <div class="results-header">
                <h2 class="serif" onclick="goHome()">← 返回首頁</h2>
                <div style="display:flex;">
                    <input type="text" id="result-search" placeholder="重新搜尋..." style="width:200px; padding:5px; font-size:1rem;">
                    <button class="action-btn" onclick="executeSearch(true)" style="padding:5px 15px; font-size:1rem;">搜尋</button>
                </div>
            </div>

            <div class="summary-stats">
                <div class="stat-box">
                    <div style="font-size:0.9rem; color:var(--text-secondary)">符合條件候選人</div>
                    <div class="num" id="sum-count">0</div>
                </div>
                <div class="stat-box">
                    <div style="font-size:0.9rem; color:var(--text-secondary)">總政治獻金規模</div>
                    <div class="num" id="sum-total">0</div>
                </div>
                <div class="stat-box">
                    <div style="font-size:0.9rem; color:var(--text-secondary)">企業捐贈佔比(平均)</div>
                    <div class="num" id="sum-corp-ratio">0%</div>
                </div>
            </div>

            <div class="controls">
                <div style="color:var(--text-secondary)">搜尋結果：<span id="search-keyword" style="color:#fff"></span></div>
                <div>
                    <label style="color:var(--text-secondary); margin-right:10px;">權力排序：</label>
                    <select id="sort-select" onchange="currentPage = 1; renderResults()">
                        <option value="total_desc">總收入 (高 → 低)</option>
                        <option value="corp_desc">營利事業捐贈 (高 → 低)</option>
                        <option value="personal_desc">個人捐贈 (高 → 低)</option>
                        <option value="votes_desc">得票數 (高 → 低)</option>
                    </select>
                </div>
            </div>

            <div class="card-grid" id="results-container">
                </div>

            <div class="pagination" id="pagination-container">
                </div>
        </div>
    </div>

    <script>
        let allData = [];
        let currentResults = [];
        
        // 分頁狀態變數
        let currentPage = 1;
        const itemsPerPage = 12; // 每頁顯示 12 筆

        // 數字字串轉換工具
        const parseMoney = (str) => {
            if (!str) return 0;
            return parseInt(str.replace(/,/g, ''), 10) || 0;
        };
        const formatMoney = (num) => num.toLocaleString('zh-TW');

        // 載入與解析 CSV
        Papa.parse("2016.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                // 預先處理需要計算的數字欄位
                allData.forEach(row => {
                    row._totalIncome = parseMoney(row['總收入']);
                    row._corpIncome = parseMoney(row['營利事業捐贈收入']);
                    row._personalIncome = parseMoney(row['個人捐贈收入']);
                    row._votes = parseMoney(row['得票數']);
                });
                
                renderLeaderboard('total_desc'); 
                renderEditorPicks();
            }
        });

        // ================= 排行榜邏輯 =================
        function switchLeaderboard(sortType, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderLeaderboard(sortType);
        }

        function renderLeaderboard(sortType) {
            let sortedData = [...allData];
            let valueKey = '';

            if (sortType === 'total_desc') {
                sortedData.sort((a, b) => b._totalIncome - a._totalIncome);
                valueKey = '_totalIncome';
            } else if (sortType === 'corp_desc') {
                sortedData.sort((a, b) => b._corpIncome - a._corpIncome);
                valueKey = '_corpIncome';
            } else if (sortType === 'personal_desc') {
                sortedData.sort((a, b) => b._personalIncome - a._personalIncome);
                valueKey = '_personalIncome';
            }

            const top10 = sortedData.slice(0, 10);
            const listContainer = document.getElementById('leaderboard-list');
            
            listContainer.innerHTML = top10.map((row, index) => `
                <li class="rank-item" onclick="quickSearch('${row['姓名']}')" style="cursor:pointer;">
                    <div class="rank-num">${index + 1}</div>
                    <div class="rank-info">
                        <span class="rank-name">${row['姓名']}</span>
                        <span class="rank-party">${row['推薦政黨']}</span>
                    </div>
                    <div class="rank-money">NT$ ${formatMoney(row[valueKey])}</div>
                </li>
            `).join('');
        }

        // ================= 其他渲染邏輯 =================
        function renderEditorPicks() {
            const sorted = [...allData].sort((a, b) => b._totalIncome - a._totalIncome).slice(0, 3);
            const container = document.getElementById('editor-picks-container');
            container.innerHTML = sorted.map(row => createCardHTML(row)).join('');
        }

        function createCardHTML(row) {
            const corpRatio = row['營利事業捐贈比例'] || '0.00%';
            return `
                <div class="data-card">
                    <div class="name">${row['姓名']} <span style="font-size:0.8rem; color:${row['當選註記'] === '*' ? 'var(--gold)' : '#555'};">${row['當選註記'] === '*' ? '★當選' : ''}</span></div>
                    <div class="party">${row['地區']} ｜ ${row['推薦政黨']}</div>
                    <div class="money">${formatMoney(row._totalIncome)}</div>
                    <div class="details">
                        企業捐贈：${formatMoney(row._corpIncome)} (${corpRatio})<br>
                        個人捐贈：${formatMoney(row._personalIncome)}<br>
                        得票數：${formatMoney(row._votes)}
                    </div>
                </div>
            `;
        }

        function executeSearch(fromResultsPage = false) {
            const inputId = fromResultsPage ? 'result-search' : 'main-search';
            const keyword = document.getElementById(inputId).value.trim();
            if (!keyword) return;

            document.getElementById('search-keyword').innerText = `「${keyword}」`;
            
            currentResults = allData.filter(row => 
                (row['姓名'] && row['姓名'].includes(keyword)) ||
                (row['推薦政黨'] && row['推薦政黨'].includes(keyword)) ||
                (row['地區'] && row['地區'].includes(keyword))
            );

            // 重置分頁狀態
            currentPage = 1;
            
            updateSummary();
            renderResults();
            
            document.getElementById('landing-view').classList.remove('active');
            document.getElementById('results-view').classList.add('active');
        }

        function quickSearch(keyword) {
            document.getElementById('main-search').value = keyword;
            executeSearch();
        }

        function goHome() {
            document.getElementById('results-view').classList.remove('active');
            document.getElementById('landing-view').classList.add('active');
            document.getElementById('main-search').value = '';
        }

        function updateSummary() {
            const count = currentResults.length;
            const totalMoney = currentResults.reduce((sum, row) => sum + row._totalIncome, 0);
            const totalCorp = currentResults.reduce((sum, row) => sum + row._corpIncome, 0);
            
            let avgCorpRatio = 0;
            if (totalMoney > 0) {
                avgCorpRatio = ((totalCorp / totalMoney) * 100).toFixed(2);
            }

            document.getElementById('sum-count').innerText = count;
            document.getElementById('sum-total').innerText = totalMoney > 100000000 
                ? (totalMoney / 100000000).toFixed(2) + ' 億' 
                : formatMoney(totalMoney);
            document.getElementById('sum-corp-ratio').innerText = avgCorpRatio + '%';
        }

        // ================= 列表渲染與分頁邏輯 =================
        function renderResults() {
            const sortType = document.getElementById('sort-select').value;
            
            // 全局排序
            currentResults.sort((a, b) => {
                if (sortType === 'total_desc') return b._totalIncome - a._totalIncome;
                if (sortType === 'corp_desc') return b._corpIncome - a._corpIncome;
                if (sortType === 'personal_desc') return b._personalIncome - a._personalIncome;
                if (sortType === 'votes_desc') return b._votes - a._votes;
                return 0;
            });

            const container = document.getElementById('results-container');
            const paginationContainer = document.getElementById('pagination-container');

            if (currentResults.length === 0) {
                container.innerHTML = '<div style="color:var(--text-secondary); grid-column: 1 / -1; text-align:center; padding: 50px;">查無金流數據，請嘗試其他關鍵字。</div>';
                paginationContainer.innerHTML = '';
                return;
            }

            // 計算分頁範圍
            const totalPages = Math.ceil(currentResults.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = totalPages;

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedData = currentResults.slice(startIndex, endIndex);

            // 渲染當前頁面的資料卡片
            container.innerHTML = paginatedData.map(row => createCardHTML(row)).join('');

            // 渲染分頁按鈕
            renderPaginationControls(totalPages);
        }

        function renderPaginationControls(totalPages) {
            const container = document.getElementById('pagination-container');
            
            // 如果只有一頁或沒有資料，不顯示分頁列
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = `
                <button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一頁</button>
                <span class="page-info">${currentPage} / ${totalPages}</span>
                <button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一頁</button>
            `;
            container.innerHTML = html;
        }

        function changePage(newPage) {
            const totalPages = Math.ceil(currentResults.length / itemsPerPage);
            if (newPage >= 1 && newPage <= totalPages) {
                currentPage = newPage;
                renderResults();
                
                // 切換分頁後，畫面平滑滾動回上方控制列的位置
                const controlsOffset = document.querySelector('.controls').offsetTop;
                window.scrollTo({ top: controlsOffset - 20, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
